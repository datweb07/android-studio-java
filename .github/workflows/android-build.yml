name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Tải source code về máy ảo
        uses: actions/checkout@v4

      - name: Cài đặt Java 17 cho máy ảo
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cấp quyền chạy cho file Gradle
        run: chmod +x gradlew

      - name: Build ứng dụng thành file APK
        run: ./gradlew assembleDebug

      - name: Đóng gói file APK và lưu lại trên GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk