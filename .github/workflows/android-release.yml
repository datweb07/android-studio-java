name: Tự động Build và Release APK

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Tải source code về máy ảo
        uses: actions/checkout@v4

      - name: 2. Cài đặt môi trường Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Cấp quyền chạy cho Gradle
        run: chmod +x gradlew

      - name: 4. Build ứng dụng thành file APK
        run: ./gradlew assembleDebug

      - name: 5. Tạo GitHub Release và đính kèm file APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Bản cập nhật App v1.0.${{ github.run_number }}
          body: File cài đặt APK được tự động build từ code mới nhất trên nhánh main. Tải file app-debug.apk ở bên dưới để cài đặt.
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}